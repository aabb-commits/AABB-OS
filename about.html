<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OS — About</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Sans+Condensed:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #ffffff; --ink: #000000; --mid: #767676; --faint: #b0b0b0; --rule: #000000; }
    html { font-size: 16px; }
    body { background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER (index.html과 동일) ── */
    header { position: sticky; top: 0; background: var(--bg); z-index: 100; }
    .hd-row1 { display: flex; align-items: center; justify-content: space-between; height: 44px; padding: 0 1rem; border-bottom: 1px solid var(--rule); }
    .site-logo { font-family: 'IBM Plex Sans Condensed', sans-serif; font-size: 1.5rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink); text-decoration: none; }
    .hd-nav { display: flex; align-items: center; gap: 1.6rem; }
    .hd-nav a { font-family: 'IBM Plex Sans Condensed', sans-serif; font-size: 1.17rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink); text-decoration: none; }
    .hd-nav a:hover, .hd-nav a.active { color: var(--mid); }

    /* ── ABOUT: 페이지 타이틀 바 ── */
    .page-bar {
      display: flex; align-items: center;
      height: 32px; padding: 0 1rem;
      border-bottom: 1px solid var(--rule);
      font-family: 'IBM Plex Sans Condensed', sans-serif;
      font-size: 1.05rem; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--mid);
    }

    /* ── ABOUT BODY: 5칸 그리드 기반 ── */
    .about-wrap {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      flex: 1;
    }

    /* 좌측 3칸: OS 소개 + 연락처 */
    .about-left {
      grid-column: 1 / 4;
      border-right: 1px solid var(--rule);
      display: flex; flex-direction: column;
    }

    /* 우측 2칸: Archive + Submit */
    .about-right {
      grid-column: 4 / 6;
      display: flex; flex-direction: column;
    }

    /* 섹션 헤더 바 */
    .section-bar {
      height: 44px; padding: 0 1.5rem;
      display: flex; align-items: center;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      font-family: 'IBM Plex Sans Condensed', sans-serif;
      font-size: 1.05rem; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--mid);
    }

    /* 본문 영역 */
    .section-body { padding: 2rem 1.5rem; flex: 1; display: flex; flex-direction: column; }

    .desc-kr { font-size: 1.05rem; line-height: 1.9; color: var(--ink); }
    .desc-en { font-size: 1.05rem; line-height: 1.9; color: var(--mid); margin-top: 1.2rem; }

    /* 연락처 */
    .contact-block { margin-top: 3rem; }
    .contact-row {
      display: grid; grid-template-columns: 50px 1fr;
      align-items: baseline;
      padding: 0.7rem 0;
      border-bottom: 1px solid #e8e8e8;
      font-size: 1.05rem;
    }
    .contact-row:first-of-type { border-top: 1px solid #e8e8e8; }
    .contact-key { font-family: 'IBM Plex Sans Condensed', sans-serif; font-size: 0.66rem; color: var(--faint); letter-spacing: 0.1em; text-transform: uppercase; }
    .contact-val { color: var(--ink); }
    .contact-val a { color: var(--ink); text-decoration: none; }
    .contact-val a:hover { text-decoration: underline; }
    .contact-val.sub { color: var(--mid); font-size: 0.76rem; }

    /* Submit */
    .submit-desc { font-size: 1.05rem; line-height: 1.9; color: var(--mid); }
    .submit-btn {
      display: inline-block; margin-top: 2.5rem;
      padding: 0.75rem 1.6rem;
      background: var(--ink); color: var(--bg);
      font-family: 'IBM Plex Sans Condensed', sans-serif;
      font-size: 1.1rem; letter-spacing: 0.14em; text-transform: uppercase;
      text-decoration: none; border: 1px solid var(--ink);
      transition: background 0.1s, color 0.1s; align-self: flex-start;
    }
    .submit-btn:hover { background: var(--bg); color: var(--ink); }

    /* CONTACT MODAL */
    .contact-modal-backdrop { position: fixed; inset: 0; background: rgba(255,255,255,0.7); backdrop-filter: blur(2px); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
    .contact-modal-backdrop.open { opacity: 1; pointer-events: all; }
    .contact-modal { background: var(--bg); border: 1px solid var(--rule); width: 280px; transform: translateY(-4px); transition: transform 0.15s; }
    .contact-modal-backdrop.open .contact-modal { transform: translateY(0); }
    .contact-modal-row { display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 1.2rem; border-bottom: 1px solid var(--rule); text-decoration: none; color: var(--ink); font-family: 'IBM Plex Sans Condensed', sans-serif; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; transition: background 0.1s; }
    .contact-modal-row:last-child { border-bottom: none; }
    .contact-modal-row:hover { background: var(--ink); color: var(--bg); }

    /* FOOTER */
    footer { border-top: 1px solid var(--rule); padding: 2rem 1.5rem; display: grid; grid-template-columns: repeat(5, 1fr); font-size: 1rem; line-height: 1.9; margin-top: auto; }
    .footer-logo { font-family: 'IBM Plex Sans Condensed', sans-serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; }
    .footer-center { grid-column: 2 / 5; text-align: center; color: var(--mid); }
    .footer-right { text-align: right; color: var(--mid); }
    .footer-right a { color: var(--mid); text-decoration: none; display: block; }
    .footer-right a:hover { color: var(--ink); }

    @media (max-width: 700px) {
      .about-wrap { grid-template-columns: 1fr; }
      .about-left { grid-column: 1; border-right: none; border-bottom: 1px solid var(--rule); }
      .about-right { grid-column: 1; }
      footer { grid-template-columns: 1fr; gap: 0.8rem; }
      .footer-center, .footer-right { text-align: left; grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="hd-row1">
    <a href="index.html" class="site-logo">OS</a>
    <nav class="hd-nav">
      <a href="about.html" class="active">About</a>
      <a href="index.html">News</a>
      <a href="index.html">Seminar</a>
      <a href="index.html">Article</a>
      <a href="#" id="contact-link">Contact</a>
    </nav>
  </div>
</header>

<div class="about-wrap" id="about-wrap">
  <!-- JS로 채워짐 -->
</div>

<div class="contact-modal-backdrop" id="contact-modal">
  <div class="contact-modal">
    <a class="contact-modal-row" href="https://maps.app.goo.gl/zo92YtDpSaYs7Nhz7" target="_blank">Google Maps &#8599;</a>
    <a class="contact-modal-row" href="https://naver.me/GoDhhbsS" target="_blank">Naver Map &#8599;</a>
    <a class="contact-modal-row" href="/cdn-cgi/l/email-protection#3d5c5c5f5f1b1e0b09065c5c5f5f13564f">aabb&#64;aabb.kr &#8599;</a>
  </div>
</div>

<footer>
  <div class="footer-logo">OS</div>
  <div class="footer-center">
    서울시 마포구 와우산로21길 10, 5F<br>
    5F, 10, Wausanro21gil, Mapogu, Seoul, KR
  </div>
  <div class="footer-right">
    <a href="https://instagram.com/aabb.os.library" target="_blank">&#64;aabb.os.library</a>
    <a href="/cdn-cgi/l/email-protection#d5b4b4b7b7f3f6e3e1eeb4b4b7b7fbbea7">aabb&#64;aabb.kr</a>
  </div>
</footer>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
(function(){
  var SID = '1hNgNNsGC0hVxicmm_B5QUksjlicXtD8eAFIl3VIAScg';
  var GID = '78065457';

  function splitLine(line){
    var res=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){res.push(cur.trim());cur='';}
      else cur+=c;
    }
    res.push(cur.trim());
    return res;
  }

  function parseKV(csv){
    var lines=csv.split('\n');
    var headers=splitLine(lines[0]);
    var vals=splitLine(lines[1]||'');
    var obj={};
    headers.forEach(function(h,i){ obj[h.trim()]=vals[i]||''; });
    return obj;
  }

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function render(d){
    var kr  = d['Desc_KR']       || '';
    var en  = d['Desc_EN']       || '';
    var email = d['email']       || '';
    var ig  = d['Instagram']     || '';
    var aKr = d['Address_KR']    || '';
    var aEn = d['Address_EN']    || '';
    var sKr = d['Submission_KR'] || '';
    var sEn = d['Submission_EN'] || '';

    var contactHTML = '';
    if(email) contactHTML += '<div class="contact-row"><span class="contact-key">E</span><span class="contact-val"><a href="mailto:'+esc(email)+'">'+esc(email)+'</a></span></div>';
    if(ig)    contactHTML += '<div class="contact-row"><span class="contact-key">IG</span><span class="contact-val"><a href="https://instagram.com/'+esc(ig.replace('@',''))+'" target="_blank">'+esc(ig)+'</a></span></div>';
    if(aKr)   contactHTML += '<div class="contact-row"><span class="contact-key">A</span><span class="contact-val">'+esc(aKr)+'</span></div>';
    if(aEn)   contactHTML += '<div class="contact-row"><span class="contact-key"></span><span class="contact-val sub">'+esc(aEn)+'</span></div>';

    document.getElementById('about-wrap').innerHTML =
      '<div class="about-left">'
        +'<div class="section-bar">Introduction</div>'
        +'<div class="section-body">'
          +(kr ? '<p class="desc-kr">'+esc(kr)+'</p>' : '')
          +(en ? '<p class="desc-en">'+esc(en)+'</p>' : '')
          +(contactHTML ? '<div class="contact-block"><div class="section-bar" style="margin: 2rem -1.5rem 0; padding-left:1.5rem">Contact</div>'+contactHTML+'</div>' : '')
        +'</div>'
      +'</div>'
      +'<div class="about-right">'
        +'<div class="section-bar">Archive</div>'
        +'<div class="section-body">'
          +(sKr ? '<p class="submit-desc">'+esc(sKr)+'</p>' : '')
          +(sEn ? '<p class="submit-desc" style="margin-top:1rem;color:var(--faint)">'+esc(sEn)+'</p>' : '')
          +'<a class="submit-btn" href="https://forms.gle/gKWMpudBKSDzDNHj6" target="_blank">Submit Publication &#8599;</a>'
        +'</div>'
      +'</div>';
  }

  var fallback = {
    'Desc_KR': 'OS는 AABB가 운영하는 초소형 문화공간입니다. OS에서는 AABB가 주목하는 독립출판물을 누구나 방문하여 열람할 수 있으며, 일부 소장 도서는 온/오프라인으로 구매 가능합니다.',
    'Desc_EN': 'OS is the cultural space to share our interest in visual arts and independent publications.',
    'email': 'aabb@aabb.kr',
    'Instagram': '@aabb.os.library',
    'Address_KR': '서울시 마포구 와우산로21길 10, 5F',
    'Address_EN': '5F, 10, Wausanro21gil, Mapogu, Seoul, KR',
    'Submission_KR': 'OS 아카이브 입고를 원하시는 출판물이 있으시면 아래 링크를 통해 문의해주세요.',
    'Submission_EN': ''
  };

  var URL = 'https://docs.google.com/spreadsheets/d/'+SID+'/export?format=csv&gid='+GID;
  fetch(URL)
    .then(function(r){ if(!r.ok) throw 0; return r.text(); })
    .then(function(t){ render(parseKV(t)); })
    .catch(function(){ render(fallback); });

  var cLink = document.getElementById('contact-link');
  var cModal = document.getElementById('contact-modal');
  cLink.addEventListener('click', function(e){ e.preventDefault(); cModal.classList.add('open'); });
  cModal.addEventListener('click', function(e){ if(e.target===cModal) cModal.classList.remove('open');
  });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') cModal.classList.remove('open'); });
})();
</script>
</body>
</html>
