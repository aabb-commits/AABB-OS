<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Sans+Condensed:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --ink: #000000; --mid: #767676; --faint: #b0b0b0;
      --rule: #000000; --lw: 1px;
      /* 5칼럼 기준 세로선 위치 - 모든 행에서 동일하게 */
      --c1: 20%; --c2: 40%; --c3: 60%; --c4: 80%;
    }
    html { font-size: 14px; }
    body { background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }

    /* ── HEADER ── */
    header { position: sticky; top: 0; background: var(--bg); z-index: 100; border-bottom: var(--lw) solid var(--rule); }

    /* Row 1: 5칼럼 균등 */
    .hd-row1 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      height: 44px;
      border-bottom: var(--lw) solid var(--rule);
    }
    .hd-cell {
      display: flex; align-items: center;
      border-right: var(--lw) solid var(--rule);
      padding: 0 1rem;
      font-family: 'IBM Plex Sans Condensed', sans-serif;
      font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase;
    }
    .hd-cell:last-child { border-right: none; }
    .hd-cell a {
      color: var(--ink); text-decoration: none;
      font-family: 'IBM Plex Sans Condensed', sans-serif;
      font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase;
      white-space: nowrap;
    }
    .hd-cell a:hover { color: var(--mid); }
    .hd-cell.logo { justify-content: center; }
    .site-logo {
      font-weight: 500; font-size: 1rem; letter-spacing: 0.18em;
      color: var(--ink); text-decoration: none;
      font-family: 'IBM Plex Sans Condensed', sans-serif;
      text-transform: uppercase;
    }
    .hd-cell.right-nav { justify-content: flex-end; gap: 1.5rem; }
    /* 좌측 nav 셀들 - 각각 분리 */
    .hd-cell.nav-item { padding: 0 1rem; }

    /* Row 2: 검색 (full width) */
    .hd-row2 {
      display: flex; align-items: center;
      height: 36px; padding: 0 1rem; gap: 0.6rem;
    }
    .search-icon { width: 13px; height: 13px; flex-shrink: 0; color: var(--faint); }
    #search { background: none; border: none; outline: none; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.78rem; color: var(--ink); width: 100%; }
    #search::placeholder { color: var(--faint); }

    /* ── TOOLBAR: 5칼럼 동일 구조 ── */
    .toolbar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      height: 36px;
      border-bottom: var(--lw) solid var(--rule);
      font-family: 'IBM Plex Sans Condensed', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .toolbar-count {
      grid-column: 1;
      display: flex; align-items: center;
      padding: 0 1rem; color: var(--mid);
      border-right: var(--lw) solid var(--rule);
    }
    .toolbar-filters {
      grid-column: 2 / 6;
      display: flex; height: 100%;
    }
    .filter-btn {
      flex: 1;
      background: none; border: none; border-right: var(--lw) solid var(--rule);
      font-family: 'IBM Plex Sans Condensed', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--mid); cursor: pointer; transition: color 0.1s;
    }
    .filter-btn:last-of-type { border-right: none; }
    .filter-btn:hover { color: var(--ink); }
    .filter-btn.active { color: var(--ink); font-weight: 500; }
    .shuffle-btn {
      flex: 0 0 44px;
      background: none; border: none; border-left: var(--lw) solid var(--rule);
      color: var(--mid); cursor: pointer; transition: color 0.1s;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; line-height: 1;
    }
    .shuffle-btn:hover { color: var(--ink); }

    /* ── GRID: 5칼럼 ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-left: var(--lw) solid var(--rule);
      border-top: var(--lw) solid var(--rule);
    }
    @media (max-width: 1200px) { .grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 900px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px)  { .grid { grid-template-columns: repeat(2, 1fr); } }

    .card { border-right: var(--lw) solid var(--rule); border-bottom: var(--lw) solid var(--rule); cursor: pointer; display: block; min-width: 0; }
    .thumb-wrap { position: relative; width: 100%; padding-top: 130%; background: #f5f5f5; overflow: hidden; }
    .thumb-wrap img { position: absolute; top: 8%; left: 8%; width: 84%; height: 84%; object-fit: contain; display: block; transition: transform 0.5s ease; }
    .card:hover .thumb-wrap img { transform: scale(1.04); }
    .thumb-no-img { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .thumb-no-img span { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); }
    .thumb-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 1rem; text-align: center; opacity: 0; transition: opacity 0.2s ease;
    }
    .thumb-wrap:hover .thumb-overlay { opacity: 1; }
    .ov-title-kr { font-size: 0.78rem; font-weight: 400; color: #fff; line-height: 1.4; }
    .ov-title-en { font-size: 0.7rem; color: rgba(255,255,255,0.65); margin-top: 0.25rem; line-height: 1.3; }
    .ov-author { font-size: 0.68rem; color: rgba(255,255,255,0.5); margin-top: 0.5rem; }
    .card-info { padding: 0.65rem 0.8rem 0.75rem; border-top: var(--lw) solid var(--rule); }
    .info-title { font-size: 0.78rem; font-weight: 400; line-height: 1.35; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .info-title-en { font-size: 0.7rem; color: var(--mid); margin-top: 0.15rem; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .state-msg { grid-column: 1/-1; text-align: center; padding: 8rem 2rem; font-size: 0.72rem; color: var(--faint); letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── MODAL ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(2px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 2rem; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--bg); width: 100%; max-width: 1000px; max-height: 85vh; display: grid; grid-template-columns: 360px 1fr; border: var(--lw) solid var(--rule); transform: translateY(8px); transition: transform 0.2s; position: relative; overflow: hidden; }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-cover { background: #f5f5f5; aspect-ratio: 3/4; position: relative; overflow: hidden; border-right: var(--lw) solid var(--rule); }
    .modal-cover img { position: absolute; top: 6%; left: 6%; width: 88%; height: 88%; object-fit: contain; }
    .modal-body { display: grid; grid-template-columns: 1fr 1fr; overflow-y: auto; }
    .modal-col { padding: 1.6rem; display: flex; flex-direction: column; }
    .modal-col-en { border-left: var(--lw) solid var(--rule); }
    .modal-id { font-size: 0.64rem; color: var(--faint); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.7rem; }
    .modal-title { font-size: 1rem; font-weight: 400; line-height: 1.4; margin-bottom: 0.2rem; }
    .modal-title-sub { font-size: 0.8rem; color: var(--mid); margin-bottom: 1.3rem; }
    .modal-meta { display: grid; grid-template-columns: 60px 1fr; gap: 0.35rem 0.5rem; font-size: 0.7rem; margin-bottom: 1.3rem; }
    .meta-label { color: var(--faint); letter-spacing: 0.06em; text-transform: uppercase; font-size: 0.64rem; }
    .meta-value { color: var(--ink); }
    .modal-desc { font-size: 0.76rem; line-height: 1.85; color: var(--mid); border-top: var(--lw) solid var(--rule); padding-top: 1rem; }
    .modal-desc-en { font-size: 0.76rem; line-height: 1.85; color: var(--mid); margin-top: 1rem; }
    .view-detail-btn { display: inline-block; margin-top: 1.5rem; padding: 0.65rem 1.3rem; background: var(--ink); color: var(--bg); font-family: 'IBM Plex Sans Condensed', sans-serif; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; border: var(--lw) solid var(--ink); transition: background 0.1s, color 0.1s; align-self: flex-start; }
    .view-detail-btn:hover { background: var(--bg); color: var(--ink); }
    .modal-close { position: absolute; top: 0; right: 0; width: 44px; height: 44px; background: var(--bg); border: none; border-left: var(--lw) solid var(--rule); border-bottom: var(--lw) solid var(--rule); font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mid); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1; font-family: 'IBM Plex Sans', sans-serif; }
    .modal-close:hover { color: var(--ink); }

    /* ── CONTACT MODAL ── */
    .contact-modal-backdrop { position: fixed; inset: 0; background: rgba(255,255,255,0.7); backdrop-filter: blur(2px); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
    .contact-modal-backdrop.open { opacity: 1; pointer-events: all; }
    .contact-modal { background: var(--bg); border: var(--lw) solid var(--rule); width: 280px; transform: translateY(-4px); transition: transform 0.15s; }
    .contact-modal-backdrop.open .contact-modal { transform: translateY(0); }
    .contact-modal-row { display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 1.2rem; border-bottom: var(--lw) solid var(--rule); text-decoration: none; color: var(--ink); font-family: 'IBM Plex Sans Condensed', sans-serif; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; transition: background 0.1s; }
    .contact-modal-row:last-child { border-bottom: none; }
    .contact-modal-row:hover { background: var(--ink); color: var(--bg); }

    /* ── FOOTER ── */
    footer { border-top: var(--lw) solid var(--rule); padding: 2rem 1.2rem; display: grid; grid-template-columns: repeat(5, 1fr); font-size: 0.72rem; letter-spacing: 0.06em; }
    .footer-logo { font-family: 'IBM Plex Sans Condensed', sans-serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; grid-column: 1; }
    .footer-center { grid-column: 2 / 5; text-align: center; color: var(--mid); line-height: 1.8; }
    .footer-right { grid-column: 5; text-align: right; color: var(--mid); }
    .footer-right a { color: var(--mid); text-decoration: none; }
    .footer-right a:hover { color: var(--ink); }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .hd-row1 { grid-template-columns: 1fr; height: auto; }
      .hd-cell { border-right: none; border-bottom: var(--lw) solid var(--rule); }
      .hd-cell.logo { justify-content: flex-start; }
      .hd-cell.right-nav { justify-content: flex-start; }
      .hd-cell.nav-item, .hd-cell.right-nav { display: flex; gap: 0; }
      .hd-cell.nav-item a, .hd-cell.right-nav a { padding: 0 1rem; border-right: var(--lw) solid var(--rule); }
      .toolbar { grid-template-columns: auto 1fr; }
      .toolbar-filters { overflow-x: auto; }
      footer { grid-template-columns: 1fr; gap: 0.8rem; }
      .footer-center, .footer-right { text-align: left; grid-column: 1; }
      .modal { grid-template-columns: 1fr; }
      .modal-cover { aspect-ratio: 4/3; border-right: none; border-bottom: var(--lw) solid var(--rule); }
      .modal-body { grid-template-columns: 1fr; }
      .modal-col-en { border-left: none; border-top: var(--lw) solid var(--rule); }
    }
  </style>
</head>
<body>

<header>
  <div class="hd-row1">
    <div class="hd-cell nav-item">
      <a href="#">News</a>
    </div>
    <div class="hd-cell nav-item">
      <a href="#">Seminar</a>
    </div>
    <div class="hd-cell nav-item">
      <a href="#">Article</a>
    </div>
    <div class="hd-cell logo">
      <a href="index.html" class="site-logo">OS</a>
    </div>
    <div class="hd-cell right-nav">
      <a href="about.html">About</a>
      <a href="#" id="contact-link">Contact</a>
    </div>
  </div>
  <div class="hd-row2">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5"/><line x1="10.5" y1="10.5" x2="15" y2="15"/></svg>
    <input type="search" id="search" placeholder="Search" autocomplete="off" />
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-count" id="count">—</div>
  <div class="toolbar-filters">
    <button class="filter-btn active" data-year="all">All</button>
    <button class="filter-btn" data-year="2026">2026</button>
    <button class="filter-btn" data-year="2025">2025</button>
    <button class="filter-btn" data-year="2024">2024</button>
    <button class="filter-btn" data-year="2023">2023</button>
    <button class="shuffle-btn" id="shuffle-btn">&#8635;</button>
  </div>
</div></div>

<main class="grid" id="grid">
  <div class="state-msg">Loading</div>
</main>

<div class="contact-modal-backdrop" id="contact-modal">
  <div class="contact-modal">
    <a class="contact-modal-row" href="https://maps.app.goo.gl/zo92YtDpSaYs7Nhz7" target="_blank">Google Maps &#8599;</a>
    <a class="contact-modal-row" href="https://naver.me/GoDhhbsS" target="_blank">Naver Map &#8599;</a>
    <a class="contact-modal-row" href="/cdn-cgi/l/email-protection#4425252626626772707f252526266a2f36">aabb&#64;aabb.kr &#8599;</a>
  </div>
</div>

<footer>
  <div class="footer-logo">OS</div>
  <div class="footer-center">5F, 10, Wausanro21gil, Mapogu, Seoul, KR<br>aabb&#64;aabb.kr</div>
  <div class="footer-right"><a href="https://instagram.com/aabb.os.library" target="_blank">&#64;aabb.os.library</a></div>
</footer>

<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-cover" id="modal-cover"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
  <button class="modal-close" id="modal-close">ESC</button>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
(function(){
  var SID = '1hNgNNsGC0hVxicmm_B5QUksjlicXtD8eAFIl3VIAScg';
  var SHEET_URL = 'https://docs.google.com/spreadsheets/d/'+SID+'/export?format=csv&gid=996701484';
  var books=[], year='all', q='';

  function thumbUrl(link){
    if(!link||link.trim()===''||link.trim()==='-') return null;
    var m=link.match(/\/d\/([\w-]+)/);
    if(m) return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w800';
    m=link.match(/[?&]id=([\w-]+)/);
    if(m) return 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w800';
    return null;
  }

  function splitLine(line){
    var res=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){res.push(cur.trim());cur='';}
      else cur+=c;
    }
    res.push(cur.trim());
    return res;
  }

  function parseCSV(csv){
    return csv.split('\n').slice(1).map(function(line){
      var c=splitLine(line);
      if(!c[0]||!c[0].trim()) return null;
      return {
        id:       c[0].trim(),
        titleKo:  c[1]||'',
        titleEn:  c[2]||'',
        authorKo: c[3]||'',
        authorEn: c[4]||'',
        pubKo:    c[5]||'',
        pubEn:    c[6]||'',
        year:     c[7]||'',
        pages:    c[8]||'',
        size:     c[9]||'',
        print:    c[10]||'',
        binding:  c[11]||'',
        desc:     c[12]||'',
        isbn:     c[13]||'',
        descEn:   c[14]||'',
        cover:    c[17]||''
      };
    }).filter(Boolean);
  }

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function filtered(){
    return books.filter(function(b){
      var yOk=year==='all'||b.year===year;
      var sq=q.toLowerCase();
      var qOk=!sq||[b.titleKo,b.titleEn,b.authorKo,b.authorEn,b.pubKo,b.pubEn].some(function(s){return s.toLowerCase().indexOf(sq)!==-1;});
      return yOk&&qOk;
    });
  }

  function render(){
    var list=filtered();
    document.getElementById('count').textContent=list.length+' Books';
    var grid=document.getElementById('grid');
    if(!list.length){grid.innerHTML='<div class="state-msg">No Results</div>';return;}
    grid.innerHTML=list.map(function(b){
      var main=(b.titleKo&&b.titleKo!=='-')?b.titleKo:b.titleEn;
      var sub=(b.titleKo&&b.titleKo!=='-')?b.titleEn:'';
      var src=thumbUrl(b.cover);
      var imgHtml=src
        ?'<img src="'+src+'" alt="'+esc(main)+'" onerror="this.parentNode.innerHTML=\'<div class=thumb-no-img><span>No Image</span></div>\'">'
        :'<div class="thumb-no-img"><span>No Image</span></div>';
      return '<div class="card" data-index="'+books.indexOf(b)+'">'
        +'<div class="thumb-wrap">'+imgHtml
        +'<div class="thumb-overlay">'
        +(main?'<div class="ov-title-kr">'+esc(main)+'</div>':'')
        +(sub?'<div class="ov-title-en">'+esc(sub)+'</div>':'')
        +((b.authorKo||b.authorEn)?'<div class="ov-author">'+esc(b.authorKo||b.authorEn)+(b.authorKo&&b.authorEn?' / '+esc(b.authorEn):'')+'</div>':'')
        +'</div></div>'
        +'<div class="card-info">'
        +'<div class="info-title">'+esc(main)+'</div>'
        +(sub?'<div class="info-title-en">'+esc(sub)+'</div>':'')
        +'</div></div>';
    }).join('');
    grid.querySelectorAll('.card').forEach(function(c){
      c.addEventListener('click',function(){openModal(+c.dataset.index);});
    });
  }

  function openModal(i){
    var b=books[i];
    var main=(b.titleKo&&b.titleKo!=='-')?b.titleKo:b.titleEn;
    var sub=(b.titleKo&&b.titleKo!=='-')?b.titleEn:'';
    var src=thumbUrl(b.cover);
    document.getElementById('modal-cover').innerHTML=src?'<img src="'+src+'" alt="'+esc(main)+'">':'';
    var rowsKr=[['저자',b.authorKo||b.authorEn],['출판사',b.pubKo||b.pubEn],['연도',b.year],['쪽수',b.pages?b.pages+'p':''],['판형',b.size],['인쇄',b.print],['제본',b.binding],['ISBN',b.isbn&&b.isbn!=='-'?b.isbn:'']].filter(function(r){return r[1];});
    var rowsEn=[['Author',b.authorEn||b.authorKo],['Publisher',b.pubEn||b.pubKo],['Year',b.year],['Pages',b.pages?b.pages+'p':''],['Size',b.size],['Print',b.print],['Binding',b.binding],['ISBN',b.isbn&&b.isbn!=='-'?b.isbn:'']].filter(function(r){return r[1];});
    document.getElementById('modal-body').innerHTML=
      '<div class="modal-col">'
        +'<div class="modal-id">'+esc(b.id)+'</div>'
        +'<div class="modal-title">'+esc(main)+'</div>'
        +(sub?'<div class="modal-title-sub">'+esc(sub)+'</div>':'<div style="margin-bottom:1.3rem"></div>')
        +'<div class="modal-meta">'+rowsKr.map(function(r){return '<span class="meta-label">'+esc(r[0])+'</span><span class="meta-value">'+esc(r[1])+'</span>';}).join('')+'</div>'
        +(b.desc?'<div class="modal-desc">'+esc(b.desc)+'</div>':'')
        +(b.descEn?'<div class="modal-desc-en">'+esc(b.descEn)+'</div>':'')
        +'<a class="view-detail-btn" href="book.html?id='+encodeURIComponent(b.id)+'" target="_blank">View Detail &#8599;</a>'
      +'</div>'
      +'<div class="modal-col modal-col-en">'
        +'<div class="modal-id" style="visibility:hidden">'+esc(b.id)+'</div>'
        +'<div class="modal-title">'+esc(b.titleEn||main)+'</div>'
        +'<div class="modal-title-sub">'+esc(b.authorEn||b.authorKo)+'</div>'
        +'<div class="modal-meta">'+rowsEn.map(function(r){return '<span class="meta-label">'+esc(r[0])+'</span><span class="meta-value">'+esc(r[1])+'</span>';}).join('')+'</div>'
        +(b.descEn?'<div class="modal-desc">'+esc(b.descEn)+'</div>':'')
      +'</div>';
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow='hidden';
  }

  function closeModal(){
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow='';
  }

  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('modal').addEventListener('click',function(e){if(e.target===document.getElementById('modal'))closeModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active'); year=btn.dataset.year; render();
    });
  });

  document.getElementById('search').addEventListener('input',function(e){q=e.target.value;render();});

  document.getElementById('shuffle-btn').addEventListener('click',function(){
    for(var i=books.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=books[i];books[i]=books[j];books[j]=tmp;}
    render();
  });

  var cLink=document.getElementById('contact-link');
  var cModal=document.getElementById('contact-modal');
  cLink.addEventListener('click',function(e){e.preventDefault();cModal.classList.add('open');});
  cModal.addEventListener('click',function(e){if(e.target===cModal)cModal.classList.remove('open');});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')cModal.classList.remove('open');});

  fetch(SHEET_URL)
    .then(function(r){if(!r.ok)throw 0;return r.text();})
    .then(function(t){
      books=parseCSV(t);
      for(var i=books.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=books[i];books[i]=books[j];books[j]=tmp;}
      render();
    })
    .catch(function(){document.getElementById('grid').innerHTML='<div class="state-msg">Unable to load</div>';});
})();
</script>
</body>
</html>
